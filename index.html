<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间储蓄罐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f5f5f5;text-align:center;padding:40px 20px;font-family:system-ui,sans-serif}
  .time{font-size:56px;margin:30px 0;font-weight:bold}
  .state{font-size:16px;color:#666;margin-bottom:20px}
  .btn-group{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  button{padding:14px 18px;border:none;border-radius:12px;background:#4285F4;color:white;font-size:16px}
  button.red{background:#f44336}
  button.gray{background:#888}
  button.green{background:#2ecc71}
  .input-line{display:flex;justify-content:center;gap:6px;align-items:center;margin:20px 0}
  input{width:60px;padding:10px;text-align:center;border:1px solid #ddd;border-radius:8px;font-size:16px}
</style>
</head>
<body>

<div class="time" id="clock">00:00:00</div>
<div class="state" id="state">已暂停</div>

<div class="btn-group">
  <button onclick="startAdd()">➕ 开始累计</button>
  <button onclick="startSub()">➖ 开始消耗</button>
  <button class="gray" onclick="doPause()">⏸ 暂停</button>
  <button class="red" onclick="doReset()">清零</button>
</div>

<div class="input-line">
  <input type="number" id="h" value="0" min="0">时
  <input type="number" id="m" value="0" min="0">分
  <input type="number" id="s" value="0" min="0">秒
</div>

<div class="btn-group">
  <button class="green" onclick="addManual()">手动加时</button>
  <button class="red" onclick="subManual()">手动减时</button>
</div>

<script>
// 已经填好你从 Discord 拿到的铃声
const alertSound = new Audio("https://cdn.discordapp.com/attachments/1493093621476495372/1493095241119436880/EXO_-_.mp3?ex=69ddb8cd&is=69dc674d&hm=d54c4df6a7e9c20aa8cf2da36d119e2ba14e12502b4574f32f01e75bc07ae6bc&");

let store = JSON.parse(localStorage.getItem('time_store')) || {
  total: 0,
  running: false,
  dir: 1,
  start: 0
};

function fmt(s) {
  const h = String(Math.floor(s / 3600)).padStart(2, '0');
  const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${h}:${m}:${sec}`;
}

function getCurrent() {
  if (!store.running) return store.total;
  const diff = Math.floor((Date.now() - store.start) / 1000);
  return Math.max(0, store.total + store.dir * diff);
}

function playAlert() {
  alertSound.currentTime = 0;
  alertSound.play().catch(() => {});
}

function updateUI() {
  const now = getCurrent();
  document.getElementById('clock').innerText = fmt(now);
  document.getElementById('state').innerText = store.running
    ? (store.dir === 1 ? '累计中…' : '消耗中…')
    : '已暂停';

  // 只有消耗到 0 才响铃
  if (now === 0 && store.running && store.dir === -1) {
    doPause();
    playAlert();
  }

  localStorage.setItem('time_store', JSON.stringify(store));
}

function startAdd() {
  store.total = getCurrent();
  store.running = true;
  store.dir = 1;
  store.start = Date.now();
  updateUI();
}

function startSub() {
  store.total = getCurrent();
  if (store.total <= 0) return;
  store.running = true;
  store.dir = -1;
  store.start = Date.now();
  updateUI();
}

function doPause() {
  store.total = getCurrent();
  store.running = false;
  updateUI();
}

function doReset() {
  doPause();
  store.total = 0;
  updateUI();
}

function addManual() {
  const h = +document.getElementById('h').value || 0;
  const m = +document.getElementById('m').value || 0;
  const s = +document.getElementById('s').value || 0;
  store.total = getCurrent() + h*3600 + m*60 + s;
  updateUI();
}

function subManual() {
  const h = +document.getElementById('h').value || 0;
  const m = +document.getElementById('m').value || 0;
  const s = +document.getElementById('s').value || 0;
  store.total = Math.max(0, getCurrent() - (h*3600 + m*60 + s));
  updateUI();
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') updateUI();
});

setInterval(updateUI, 1000);
updateUI();
</script>
</body>
</html>
