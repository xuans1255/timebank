<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间罐</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;text-align:center;padding:40px 20px;font-family:sans-serif}
.time{font-size:46px;margin:30px 0}
.btn-group{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:10px 0}
button{padding:12px 14px;border:none;border-radius:10px;background:#4285F4;color:white;font-size:15px}
.red{background:#f44336}
.gray{background:#666}
.green{background:#2ecc71}
input{width:60px;padding:8px;text-align:center;border:1px solid #ddd;border-radius:8px}
.manual{margin:20px 0;display:flex;justify-content:center;gap:6px;align-items:center}
</style>
</head>
<body>
<div class="time" id="show">00:00:00</div>

<div class="btn-group">
<button onclick="startAdd()">➕ 累计</button>
<button onclick="startCut()">➖ 消耗</button>
<button class="gray" onclick="pause()">⏸ 暂停</button>
<button class="red" onclick="reset()">清零</button>
</div>

<div class="manual">
<input type="number" id="h" value="0" min="0">时
<input type="number" id="m" value="0" min="0">分
<input type="number" id="s" value="0" min="0">秒
</div>

<div class="btn-group">
<button class="green" onclick="addManual()">手动加时间</button>
<button class="red" onclick="cutManual()">手动减时间</button>
</div>

<script>
let totalSec = +localStorage.getItem('totalSec')||0
let timer=null

function fmt(s){
  h=String(Math.floor(s/3600)).padStart(2,'0')
  m=String(Math.floor((s%3600)/60)).padStart(2,'0')
  sc=String(s%60).padStart(2,'0')
  return h+':'+m+':'+sc
}

function render(){
  document.getElementById('show').innerText=fmt(totalSec)
  localStorage.setItem('totalSec',totalSec)
}

function startAdd(){clearInterval(timer);timer=setInterval(()=>{totalSec++;render()},1000)}
function startCut(){clearInterval(timer);timer=setInterval(()=>{totalSec>0&&totalSec--;render()},1000)}
function pause(){clearInterval(timer)}
function reset(){clearInterval(timer);totalSec=0;render()}

function addManual(){
  let h=+document.getElementById('h').value
  let m=+document.getElementById('m').value
  let s=+document.getElementById('s').value
  totalSec+=h*3600+m*60+s
  render()
}
function cutManual(){
  let h=+document.getElementById('h').value
  let m=+document.getElementById('m').value
  let s=+document.getElementById('s').value
  let sub=h*3600+m*60+s
  totalSec=Math.max(0,totalSec-sub)
  render()
}

render()
</script>
</body>
</html>
